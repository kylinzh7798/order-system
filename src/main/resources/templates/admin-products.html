<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Product Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>🛠️ Admin - Product Management</h2>

<!-- logout -->
<form th:action="@{/logout}" method="post" class="mb-3">
    <button class="btn btn-danger">Logout</button>
</form>

<!-- success message -->
<div th:if="${param.success}" class="alert alert-success">
    Operation successful!
</div>

<!-- add button -->
<a href="/ui/products/new" class="btn btn-primary mb-3">➕ Add Product</a>

<!-- table -->
<table class="table table-bordered table-hover">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Price</th>
        <th width="180px">Action</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="p : ${products}">
        <td th:text="${p.id}"></td>
        <td th:text="${p.name}"></td>
        <td th:text="${p.price}"></td>

        <td>
            <!-- edit -->
            <a th:href="@{'/ui/products/edit/' + ${p.id}}"
               class="btn btn-warning btn-sm">Edit</a>

            <!-- delete -->
            <form th:action="@{'/ui/products/delete/' + ${p.id}}"
                  method="post"
                  style="display:inline;">
                <button class="btn btn-danger btn-sm"
                        onclick="return confirm('Delete this product?')">
                    Delete
                </button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
