<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Products</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5 bg-light">

<div th:if="${param.success == 'created'}" class="alert alert-success">
    Product created!
</div>

<div th:if="${param.success == 'updated'}" class="alert alert-success">
    Product updated!
</div>

<div th:if="${param.success == 'deleted'}" class="alert alert-danger">
    Product deleted!
</div>
<div class="container">
    <h1 class="mb-4">Product List</h1>

    <a class="btn btn-primary mb-3" href="/ui/products/new">Add Product</a>
    <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit">TEST LOGOUT</button>
    </form>
    <table class="table table-striped shadow">
        <thead>
        <tr>
            <th>No.</th>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="product, stat : ${products}">
            <td th:text="${stat.count}"></td>
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td th:text="${product.price}"></td>
            <td>
                <a th:href="@{'/ui/products/edit/' + ${product.id}}"
                   class="btn btn-warning">Edit</a>
                <a class="btn btn-danger btn-sm"
                   th:href="@{'/ui/products/delete/' + ${product.id}}">
                    Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
