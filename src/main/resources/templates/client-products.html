<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Store</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }

        .chat-box {
            height: 300px;
            overflow-y: auto;
            background: #ffffff;
            border-radius: 10px;
            padding: 10px;
        }

        .user-msg {
            text-align: right;
        }

        .ai-msg {
            text-align: left;
        }
    </style>
</head>

<body class="container mt-4">

<h2 class="mb-3">🛒 Product Store</h2>

<!-- 🔍 搜索 -->
<!--<form method="get" action="/client/products" class="mb-3 d-flex">-->
<!--    <input type="text" name="keyword"-->
<!--           placeholder="Search product..."-->
<!--           class="form-control me-2"/>-->
<!--    <button type="submit" class="btn btn-primary">Search</button>-->
<!--</form>-->

<!-- 🔐 Logout -->
<form th:action="@{/logout}" method="post" class="mb-3">
    <button type="submit">LOGOUT</button>
<!--    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />-->
    <button type="submit" class="btn btn-outline-danger">Logout</button>
</form>

<!-- ⚠️ 空结果提示 -->
<div th:if="${#lists.isEmpty(products)}" class="alert alert-warning">
    No products found
</div>

<!-- 📦 商品表 -->
<table class="table table-striped shadow-sm">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Price</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${products}">
        <td th:text="${p.id}"></td>
        <td th:text="${p.name}"></td>
        <td th:text="${p.price}"></td>
    </tr>
    </tbody>
</table>

<!-- 🤖 AI Assistant -->
<div class="card mt-4 shadow">
    <div class="card-header bg-dark text-white">
        🤖 AI Assistant
    </div>

    <div class="card-body chat-box" id="chatBox">
    </div>

    <div class="card-footer d-flex">
        <input id="msg" class="form-control me-2"
               placeholder="Try: add iphone 999 / search iphone">
        <button class="btn btn-primary" onclick="send()">Send</button>
    </div>
</div>

<!-- JS -->
<script>
function send() {
    const msgInput = document.getElementById("msg");
    const msg = msgInput.value;

    if (!msg) return;

    const chatBox = document.getElementById("chatBox");

    // 用户消息
    chatBox.innerHTML += `
        <div class="user-msg mb-2">
            <span class="badge bg-primary">${msg}</span>
        </div>
    `;

    fetch("/api/ai/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg })
    })
    .then(res => res.text())
    .then(data => {

        // AI 回复
        chatBox.innerHTML += `
            <div class="ai-msg mb-2">
                <span class="badge bg-secondary">${data}</span>
            </div>
        `;

        chatBox.scrollTop = chatBox.scrollHeight;
    });

    msgInput.value = "";
}
</script>

</body>
</html>
