<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <meta charset="UTF-8">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #dfe9f3, #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 背景气泡 */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.6;
        }

        .c1 {
            width: 300px;
            height: 300px;
            background: #b6c7ff;
            top: 10%;
            left: 20%;
        }

        .c2 {
            width: 250px;
            height: 250px;
            background: #e0d4ff;
            bottom: 10%;
            right: 20%;
        }

        /* 登录卡片 */
        .login-card {
            position: relative;
            width: 350px;
            padding: 30px;
            border-radius: 20px;

            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);

            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.6);
        }

        .options {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 20px;
            border: none;
            background: #ffffff;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #eee;
        }

        .alert {
            text-align: center;
            color: red;
            margin-bottom: 10px;
        }

    </style>
</head>
<body>

<div class="bg-circle c1"></div>
<div class="bg-circle c2"></div>

<div class="login-card">
    <h2>LOGIN</h2>

    <!-- 错误提示 -->
    <div th:if="${param.error}" class="alert">
        Invalid credentials
    </div>

    <form th:action="@{/login}" method="post">
        <!-- CSRF -->
<!--        <input type="hidden"-->
<!--               th:name="${_csrf.parameterName}"-->
<!--               th:value="${_csrf.token}" />-->

        <input type="text" name="username" placeholder="Email address" required>
        <input type="password" name="password" placeholder="Password" required>

        <div class="options">
            <label><input type="checkbox"> Remember me</label>
            <span>Forgot password?</span>
        </div>

        <button type="submit">SIGN IN</button>
    </form>
</div>

</body>
</html>
