<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <meta charset="UTF-8">

    ```
    <style>
    * {
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        margin: 0;
        height: 100vh;
        background: linear-gradient(135deg, #dfe9f3, #ffffff);
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    .bg-circle {
        position: absolute;
        border-radius: 50%;
        filter: blur(60px);
        opacity: 0.6;
    }

    .c1 {
        width: 300px;
        height: 300px;
        background: #b6c7ff;
        top: 10%;
        left: 20%;
    }

    .c2 {
        width: 250px;
        height: 250px;
        background: #e0d4ff;
        bottom: 10%;
        right: 20%;
    }

    .login-card {
        position: relative;
        width: 350px;
        padding: 30px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.3);
        box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        letter-spacing: 3px;
        margin-bottom: 20px;
        color: #333;
    }

    input[type="text"],
    input[type="password"] {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border-radius: 10px;
        border: none;
        outline: none;
        background: rgba(255,255,255,0.7);
    }

    .options {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        margin-bottom: 15px;
    }

    button {
        width: 100%;
        padding: 12px;
        border-radius: 20px;
        border: none;
        background: #ffffff;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover {
        background: #eee;
    }

    .alert {
        text-align: center;
        color: red;
        margin-bottom: 10px;
    }
</style>
    ```

</head>

<body>

<div class="bg-circle c1"></div>
<div class="bg-circle c2"></div>

<div class="login-card">
    <h2>LOGIN</h2>

    ```
    <!-- 登录失败 -->
    <div th:if="${param.error}" class="alert">
        ❌ Invalid username or password
    </div>

    <!-- 登出成功 -->
    <div th:if="${param.logout}" class="alert" style="color: green;">
        ✅ Logged out successfully
    </div>

    <!-- ⭐关键：action 必须是 /ui/login -->
    <form th:action="@{/login}" method="post">


        <!-- ⭐字段名必须是 username/password -->
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <div class="options">
            <label>
                <input type="checkbox" name="remember-me"> Remember me
            </label>
            <span>Forgot password?</span>
        </div>

        <button type="submit">SIGN IN</button>
    </form>
    ```

</div>

</body>
</html>
